name: Awan CI Workflow

on:
  push:
    branches: [ "main", "develop" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ "main", "develop" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-and-test:
    name: Build and Test (iOS Simulator)
    runs-on: macos-14
    needs: lint
    timeout-minutes: 30

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Select Xcode version
      - name: Set Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      # 3. Cache Swift Package Manager Dependencies
      - name: Cache Swift PM
        uses: actions/cache@v4
        with:
          path: SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # 4. Resolve an available simulator dynamically
      - name: Select Simulator
        id: simulator
        run: |
          DEVICE_UUID=$(xcrun simctl list devices available -j \
            | python3 -c "
import json, sys
data = json.load(sys.stdin)
candidates = []
for runtime, devices in data['devices'].items():
    if 'iOS' not in runtime:
        continue
    for d in devices:
        if d.get('isAvailable') and 'iPhone' in d['name']:
            candidates.append((runtime, d['name'], d['udid']))
if not candidates:
    sys.exit('No available iOS iPhone simulator found')
candidates.sort(reverse=True)
runtime, name, udid = candidates[0]
print(f'Selected {name} on {runtime}', file=sys.stderr)
print(udid)
")
          echo "udid=$DEVICE_UUID" >> "$GITHUB_OUTPUT"

      # 5. Build first, separately from testing
      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -project Awan.xcodeproj \
            -scheme Awan \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -clonedSourcePackagesDirPath SourcePackages \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      # 6. Run Unit/UI Tests without rebuilding
      - name: Run Tests
        run: |
          xcodebuild test-without-building \
            -project Awan.xcodeproj \
            -scheme Awan \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -clonedSourcePackagesDirPath SourcePackages \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      # 7. Upload the .xcresult bundle
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_id }}
          path: TestResults.xcresult
          retention-days: 14
