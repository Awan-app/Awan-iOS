name: Feature request
description: Suggest an improvement for Awan iOS.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or user need
      description: What problem would this solve, and for whom?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the outcome or behavior you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there workarounds or other approaches?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, examples, or anything else that helps explain the request.
